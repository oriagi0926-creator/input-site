<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#4F46E5;--ac-lt:#EEF2FF;--fg:#1a1a1a;--fg2:#555;--fg3:#999;--bg:#fff;--bg2:#f8f8f6;--bg3:#f2f2ef;--border:#e5e5e0;--border2:#d0d0ca;--rad:8px;--rad-lg:12px;}
@media(prefers-color-scheme:dark){:root{--fg:#f0f0ec;--fg2:#aaa;--fg3:#555;--bg:#141414;--bg2:#1e1e1c;--bg3:#282826;--border:#2e2e2c;--border2:#3a3a38;--ac-lt:#1e1b4b;}}
body{font-family:'Noto Sans JP',sans-serif;color:var(--fg);background:var(--bg);min-height:100vh;font-size:14px;}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);height:52px;padding:0 16px;display:flex;align-items:center;gap:12px;}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ac);flex-shrink:0;}
.srch{flex:1;max-width:380px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
.srch input{border:none;background:transparent;font-size:13px;color:var(--fg);outline:none;width:100%;font-family:'Noto Sans JP',sans-serif;}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-p{background:var(--ac);color:#fff;border:none;border-radius:var(--rad);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.btn-p:hover{opacity:.88;}
.btn-o{background:transparent;border:1px solid var(--border);border-radius:var(--rad);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;color:var(--fg2);display:flex;align-items:center;gap:5px;font-family:'Noto Sans JP',sans-serif;transition:all .12s;white-space:nowrap;}
.btn-o:hover{border-color:var(--ac);color:var(--ac);}
.btn-i{background:transparent;border:1px solid var(--border);border-radius:var(--rad);padding:6px 8px;cursor:pointer;color:var(--fg2);display:flex;align-items:center;}
.sb-tog{display:none;}
.layout{display:flex;min-height:calc(100vh - 52px);}
.sb{width:215px;flex-shrink:0;border-right:1px solid var(--border);padding:14px 0;background:var(--bg2);position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;}
.sb-lbl{font-size:10px;font-weight:700;color:var(--fg3);letter-spacing:.1em;text-transform:uppercase;padding:0 16px 8px;}
.cat-r{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s;}
.cat-r:hover{background:var(--bg3);}
.cat-r.on{background:var(--ac-lt);}
.cat-r.on .cat-nm{color:var(--ac);font-weight:500;}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-nm{font-size:13px;color:var(--fg2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-n{font-size:11px;color:var(--fg3);}
.sb-div{border-top:1px solid var(--border);margin:12px 0;}
.lu{font-size:11px;color:var(--fg3);padding:8px 16px 0;text-align:center;}
.main{flex:1;min-width:0;padding:20px;}
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.pg-ttl{font-size:16px;font-weight:700;}
.i-ct{font-size:12px;color:var(--fg3);background:var(--bg2);padding:2px 10px;border-radius:20px;border:1px solid var(--border);}
.vtog{display:flex;border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;}
.vb{padding:5px 9px;background:none;border:none;color:var(--fg3);cursor:pointer;display:flex;align-items:center;}
.vb.on{background:var(--bg3);color:var(--fg);}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tchip{padding:4px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);color:var(--fg2);cursor:pointer;background:transparent;font-family:'Noto Sans JP',sans-serif;transition:all .12s;white-space:nowrap;}
.tchip:hover{border-color:var(--ac);color:var(--ac);}
.ubar{background:var(--ac-lt);border:1px solid var(--ac);border-radius:var(--rad);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--ac);display:none;align-items:center;gap:8px;}
.ubar.show{display:flex;}
.spin{width:14px;height:14px;border:2px solid var(--ac);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.yc{cursor:default;border-radius:var(--rad-lg);overflow:hidden;transition:transform .15s;}
.yc:hover{transform:translateY(-2px);}
.ythumb{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--rad-lg);overflow:hidden;background:var(--bg3);}
.ythumb img{width:100%;height:100%;object-fit:cover;display:block;}
.ythumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:38px;}
.yc-src{position:absolute;bottom:7px;left:8px;background:rgba(0,0,0,.6);color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.yc-star{position:absolute;top:7px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:4px;padding:2px 7px;font-size:12px;cursor:pointer;}
.yc-del{position:absolute;top:7px;left:8px;background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .12s;}
.yc:hover .yc-del{opacity:1;}
.yc-info{display:flex;gap:10px;padding:10px 2px 0;}
.yc-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.yc-meta{flex:1;min-width:0;}
.yc-ttl{font-size:13px;font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;}
.yc-ttl a{color:inherit;text-decoration:none;}
.yc-ttl a:hover{text-decoration:underline;}
.yc-sub{font-size:11px;color:var(--fg3);display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.tbadge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;}
.f-list{display:flex;flex-direction:column;gap:8px;}
.li{display:flex;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--rad-lg);background:var(--bg);transition:border-color .12s;}
.li:hover{border-color:var(--border2);}
.li-th{width:120px;height:68px;border-radius:var(--rad);overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;}
.li-th img{width:100%;height:100%;object-fit:cover;display:block;}
.li-body{flex:1;min-width:0;}
.li-ttl{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.li-ttl a{color:inherit;text-decoration:none;}
.li-ttl a:hover{text-decoration:underline;}
.li-meta{font-size:11px;color:var(--fg3);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.li-del{opacity:0;background:none;border:none;color:var(--fg3);cursor:pointer;font-size:15px;padding:4px;align-self:center;}
.li:hover .li-del{opacity:1;}
.empty{text-align:center;padding:64px 20px;color:var(--fg3);}
.empty-ico{font-size:48px;margin-bottom:12px;}
.empty p{font-size:14px;margin-bottom:16px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:400;transition:transform .22s;pointer-events:none;white-space:nowrap;}
.toast.sh{transform:translateX(-50%) translateY(0);}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;}
@media(max-width:680px){
  .sb{display:none;position:fixed;top:52px;left:0;height:calc(100vh - 52px);z-index:45;width:240px;box-shadow:2px 0 16px rgba(0,0,0,.15);}
  .sb.op{display:flex;}.sb-ov.op{display:block;}
  .sb-tog{display:flex;align-items:center;}
  .yt-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .li-th{width:90px;height:52px;}
  .btn-p span,.btn-o span{display:none;}
  .btn-p,.btn-o{padding:7px 10px;}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sb-ov" id="sb-ov" onclick="closeSB()"></div>
<header class="hdr">
  <button class="btn-i sb-tog" onclick="toggleSB()">
    <svg width="16" height="16" viewBox="0 0 16 16"><rect y="2" width="16" height="1.5" rx=".75" fill="currentColor"/><rect y="7.25" width="16" height="1.5" rx=".75" fill="currentColor"/><rect y="12.5" width="16" height="1.5" rx=".75" fill="currentColor"/></svg>
  </button>
  <div class="logo">Input.</div>
  <div class="srch">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="q" placeholder="検索..." oninput="renderFeed()">
  </div>
  <div class="hdr-r">
    <button class="btn-o" onclick="refreshAll()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13.5 2.5v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>更新</span>
    </button>
    <button class="btn-p" onclick="openAdd()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><line x1="7" y1="1" x2="7" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="7" x2="13" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      <span>手動追加</span>
    </button>
  </div>
</header>
<div class="layout">
  <aside class="sb" id="sb">
    <div style="padding:0 12px;margin-bottom:6px;">
      <div class="sb-lbl">カテゴリ</div>
      <div id="cat-list"></div>
    </div>
    <div class="sb-div"></div>
    <div class="lu" id="lu"></div>
  </aside>
  <main class="main">
    <div class="tbar">
      <div class="pg-ttl" id="pg-ttl">すべて</div>
      <span class="i-ct" id="i-ct">0件</span>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <div class="vtog">
          <button class="vb on" id="vg" onclick="setView('grid')">
            <svg width="13" height="13" viewBox="0 0 14 14"><rect x="0" y="0" width="5.5" height="5.5" rx="1" fill="currentColor"/><rect x="8.5" y="0" width="5.5" height="5.5" rx="1" fill="currentColor"/><rect x="0" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1" fill="currentColor"/></svg>
          </button>
          <button class="vb" id="vl" onclick="setView('list')">
            <svg width="13" height="13" viewBox="0 0 14 14"><rect x="0" y="0" width="14" height="2.5" rx="1" fill="currentColor"/><rect x="0" y="5.5" width="14" height="2.5" rx="1" fill="currentColor"/><rect x="0" y="11" width="14" height="2.5" rx="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="ubar" id="ubar"><div class="spin"></div><span id="umsg">取得中...</span></div>
    <div class="tag-row" id="tags"></div>
    <div id="feed"></div>
  </main>
</div>

<!-- ADD MODAL -->
<div style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;" id="add-mo" onclick="if(event.target===this)closeAdd()">
  <div style="background:var(--bg);width:100%;max-width:480px;border-radius:var(--rad-lg) var(--rad-lg) 0 0;padding:20px 20px 32px;max-height:90vh;overflow-y:auto;">
    <div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;"></div>
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">手動でインプットを追加</h3>
    <label style="font-size:12px;color:var(--fg2);display:block;margin-bottom:4px;font-weight:500;">タイトル *</label>
    <input style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg2);color:var(--fg);outline:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;" id="m-title" placeholder="タイトルを入力...">
    <label style="font-size:12px;color:var(--fg2);display:block;margin-bottom:4px;font-weight:500;">URL（任意）</label>
    <input style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg2);color:var(--fg);outline:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;" id="m-url" placeholder="https://...">
    <label style="font-size:12px;color:var(--fg2);display:block;margin-bottom:4px;font-weight:500;">カテゴリ</label>
    <select style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg2);color:var(--fg);outline:none;font-family:'Noto Sans JP',sans-serif;appearance:none;margin-bottom:10px;" id="m-cat"></select>
    <label style="font-size:12px;color:var(--fg2);display:block;margin-bottom:4px;font-weight:500;">メモ（任意）</label>
    <textarea style="width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg2);color:var(--fg);outline:none;font-family:'Noto Sans JP',sans-serif;resize:vertical;min-height:60px;margin-bottom:10px;" id="m-memo" placeholder="メモ..."></textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button style="flex:1;padding:10px;font-size:13px;border:1px solid var(--border);border-radius:var(--rad);background:transparent;color:var(--fg2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;" onclick="closeAdd()">キャンセル</button>
      <button style="flex:2;padding:10px;font-size:13px;font-weight:700;border:none;border-radius:var(--rad);background:var(--ac);color:#fff;cursor:pointer;font-family:'Noto Sans JP',sans-serif;" onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<script>
// ===== FEEDS CONFIG =====
// _redirects でプロキシされたURLを使用
const FEEDS = [
  { id:'sakuma',   name:'咲熊',          catId:5, type:'video',   url:'/proxy/yt/UCNQMIxQfa43QkkudqAap_9A' },
  { id:'ore',      name:'俺の世界史ch',   catId:5, type:'video',   url:'/proxy/yt/UCN1LT_sxN2A-aZU-9YdblYg' },
  { id:'takarazuka', name:'宝塚公式',     catId:3, type:'music',   url:'/proxy/yt/UCpmLMQwZl7-sKHqFWzKZKrQ' },
  { id:'jump',     name:'ジャンプ公式',   catId:2, type:'book',    url:'/proxy/yt/UCTThOe_3n0WJZ9sRWAMa2aA' },
  { id:'bunshun',  name:'文春オンライン', catId:1, type:'article', url:'/proxy/rss/bunshun.jp%2Frss%2Flist' },
  { id:'amazon',   name:'Amazon新刊',    catId:2, type:'book',    url:'/proxy/rss/www.amazon.co.jp%2Frss%2Fnew-releases%2Fbooks%2F' },
  { id:'note-scenario', name:'note #脚本', catId:1, type:'article', url:'/proxy/rss/note.com%2Fhashtag%2F%E8%84%9A%E6%9C%AC%2Frss' },
  { id:'note-manga',    name:'note #漫画', catId:2, type:'article', url:'/proxy/rss/note.com%2Fhashtag%2F%E6%BC%AB%E7%94%BB%2Frss' },
  { id:'note-musical',  name:'note #ミュージカル', catId:3, type:'article', url:'/proxy/rss/note.com%2Fhashtag%2F%E3%83%9F%E3%83%A5%E3%83%BC%E3%82%B8%E3%82%AB%E3%83%AB%2Frss' },
];

const CATS = [
  {id:1, name:'脚本・映画',       color:'#F59E0B', bg:'#FEF3C7'},
  {id:2, name:'書籍・漫画',       color:'#10B981', bg:'#D1FAE5'},
  {id:3, name:'ミュージカル・音楽', color:'#8B5CF6', bg:'#EDE9FE'},
  {id:4, name:'宇宙・科学',       color:'#6366F1', bg:'#EEF2FF'},
  {id:5, name:'歴史',             color:'#0EA5E9', bg:'#E0F2FE'},
];

const TM = {
  video:   {icon:'🎬',label:'動画',   color:'#EF4444',bg:'#FEE2E2'},
  article: {icon:'📰',label:'記事',   color:'#6366F1',bg:'#EEF2FF'},
  book:    {icon:'📚',label:'書籍',   color:'#10B981',bg:'#D1FAE5'},
  music:   {icon:'🎵',label:'音楽・舞台',color:'#8B5CF6',bg:'#EDE9FE'},
  other:   {icon:'💡',label:'その他', color:'#F59E0B',bg:'#FEF3C7'},
};

function loadState(){
  try{const s=localStorage.getItem('inp_v8');if(s)return JSON.parse(s);}catch(e){}
  return{items:[],selCat:null,view:'grid',nii:1,lastUpdated:null};
}
let S=loadState();
function persist(){localStorage.setItem('inp_v8',JSON.stringify(S));}
function getcat(id){return CATS.find(c=>c.id===id);}
function ago(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60)return'たった今';if(d<3600)return Math.floor(d/60)+'分前';
  if(d<86400)return Math.floor(d/3600)+'時間前';
  if(d<86400*7)return Math.floor(d/86400)+'日前';
  return new Date(ts).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
}
function ytId(url){
  try{const u=new URL(url);
    if(u.hostname.includes('youtube.com'))return u.searchParams.get('v');
    if(u.hostname.includes('youtu.be'))return u.pathname.slice(1);
  }catch(e){}return null;
}
function ytThumb(id){return`https://img.youtube.com/vi/${id}/mqdefault.jpg`;}

// ===== RSS FETCH via _redirects proxy =====
async function fetchFeed(feed){
  try{
    const r = await fetch(feed.url, {signal:AbortSignal.timeout(10000)});
    const xml = await r.text();
    if(!xml||!xml.includes('<')) return [];
    return parseXml(xml, feed);
  }catch(e){return [];}
}

function parseXml(xml, feed){
  const items=[];
  const isYt = feed.url.includes('/proxy/yt/');
  const re = /<entry[^>]*>([\s\S]*?)<\/entry>|<item[^>]*>([\s\S]*?)<\/item>/gi;
  let m;
  while((m=re.exec(xml))!==null && items.length<20){
    const block=m[1]||m[2];
    const get=tag=>{
      const r=new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?<\\/${tag}>`,'i');
      const rm=block.match(r);return rm?rm[1].replace(/<[^>]+>/g,'').trim():'';
    };
    const getAttr=(tag,attr)=>{
      const r=new RegExp(`<${tag}[^>]*${attr}=["']([^"']+)["']`,'i');
      const rm=block.match(r);return rm?rm[1]:'';
    };
    let link=get('link')||getAttr('link','href');
    if(!link){const g=block.match(/<guid[^>]*>([^<]+)<\/guid>/i);if(g&&g[1].startsWith('http'))link=g[1].trim();}
    const mt=block.match(/<media:thumbnail[^>]*url=["']([^"']+)["']/i);
    const mc=block.match(/<media:content[^>]*url=["']([^"']+)["']/i);
    const enc=block.match(/<enclosure[^>]*url=["']([^"']+)["']/i);
    const imgD=block.match(/<img[^>]+src=["']([^"']+)["']/i);
    const pubDate=get('pubDate')||get('published')||get('updated')||'';
    const title=get('title');
    if(!title)continue;
    // For YouTube, extract video ID from link
    const vid=ytId(link);
    let thumb=(mt&&mt[1])||(mc&&mc[1])||(enc&&enc[1])||(imgD&&imgD[1])||'';
    if(!thumb&&vid)thumb=ytThumb(vid);
    items.push({
      id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      catId:feed.catId,type:feed.type,
      title,url:link,thumb,memo:'',
      time:pubDate?new Date(pubDate).getTime():Date.now(),
      star:0,feedName:feed.name
    });
  }
  return items.filter(i=>i.title);
}

async function refreshAll(){
  const bar=document.getElementById('ubar'),msg=document.getElementById('umsg');
  bar.className='ubar show';
  const existUrls=new Set(S.items.map(i=>i.url).filter(Boolean));
  let newCount=0,failCount=0;
  for(let i=0;i<FEEDS.length;i++){
    const f=FEEDS[i];
    msg.textContent=`「${f.name}」を取得中... (${i+1}/${FEEDS.length})`;
    const its=await fetchFeed(f);
    if(its.length>0){
      for(const it of its){
        if(it.url&&existUrls.has(it.url))continue;
        if(it.url)existUrls.add(it.url);
        S.items.unshift(it);newCount++;
      }
    }else failCount++;
    await new Promise(r=>setTimeout(r,300));
  }
  if(S.items.length>800)S.items=S.items.slice(0,800);
  S.lastUpdated=Date.now();
  persist();bar.className='ubar';
  renderSB();renderTags();renderFeed();
  let t=newCount>0?`${newCount}件取得しました`:'新しいアイテムはありませんでした';
  if(failCount>0)t+=`（${failCount}件失敗）`;
  showToast(t);
}

function renderSB(){
  const el=document.getElementById('cat-list');
  let h=`<div class="cat-r ${S.selCat===null?'on':''}" onclick="selCat(null)">
    <div class="cat-dot" style="background:#6366F1"></div>
    <span class="cat-nm">すべて</span><span class="cat-n">${S.items.length}</span></div>`;
  CATS.forEach(c=>{
    const n=S.items.filter(i=>i.catId===c.id).length;
    h+=`<div class="cat-r ${S.selCat===c.id?'on':''}" onclick="selCat(${c.id})">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span class="cat-nm">${c.name}</span><span class="cat-n">${n}</span></div>`;
  });
  el.innerHTML=h;
  document.getElementById('lu').textContent=S.lastUpdated?`最終更新: ${ago(S.lastUpdated)}`:'未更新';
}
function renderTags(){
  const el=document.getElementById('tags');
  if(S.selCat!==null){el.innerHTML='';return;}
  el.innerHTML=CATS.map(c=>`<button class="tchip" onclick="selCat(${c.id})" style="border-color:${c.color};color:${c.color}">${c.name}</button>`).join('');
}
function renderFeed(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  let items=[...S.items];
  if(S.selCat!==null)items=items.filter(i=>i.catId===S.selCat);
  if(q)items=items.filter(i=>i.title.toLowerCase().includes(q));
  items.sort((a,b)=>b.time-a.time);
  const cat=S.selCat?getcat(S.selCat):null;
  document.getElementById('pg-ttl').textContent=cat?cat.name:'すべて';
  document.getElementById('i-ct').textContent=items.length+'件';
  const fc=document.getElementById('feed');
  if(!items.length){
    fc.innerHTML=`<div class="empty"><div class="empty-ico">📡</div>
      <p>「更新」ボタンを押して最新情報を取得してください</p>
      <button class="btn-p" style="display:inline-flex;margin:0 auto" onclick="refreshAll()">今すぐ更新</button></div>`;
    fc.className='';return;
  }
  if(S.view==='grid'){
    fc.className='yt-grid';
    fc.innerHTML=items.map(item=>{
      const c=getcat(item.catId),tm=TM[item.type]||TM.other;
      const vid=ytId(item.url||'');
      const thumb=item.thumb||(vid?ytThumb(vid):'');
      const stars=item.star?'★'.repeat(item.star):'☆';
      return`<div class="yc">
        <div class="ythumb">
          ${thumb?`<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
          <div class="ythumb-ph" style="background:${c?.bg||tm.bg};display:${thumb?'none':'flex'}">${tm.icon}</div>
          <span class="yc-src">${item.feedName}</span>
          <button class="yc-star" onclick="cycleStar('${item.id}')">${stars}</button>
          <button class="yc-del" onclick="delItem('${item.id}')">削除</button>
        </div>
        <div class="yc-info">
          <div class="yc-av" style="background:${c?.color||tm.color}">${(c?.name||'?')[0]}</div>
          <div class="yc-meta">
            <div class="yc-ttl">${item.url?`<a href="${item.url}" target="_blank" rel="noopener">${item.title}</a>`:item.title}</div>
            <div class="yc-sub">
              <span style="color:${c?.color}">${c?.name||''}</span>
              <span class="tbadge" style="background:${tm.bg};color:${tm.color}">${tm.label}</span>
              <span>${ago(item.time)}</span>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }else{
    fc.className='f-list';
    fc.innerHTML=items.map(item=>{
      const c=getcat(item.catId),tm=TM[item.type]||TM.other;
      const vid=ytId(item.url||'');
      const thumb=item.thumb||(vid?ytThumb(vid):'');
      const stars=item.star?'★'.repeat(item.star):'';
      return`<div class="li">
        <div class="li-th" style="background:${c?.bg||tm.bg}">
          ${thumb?`<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">`:`<span>${tm.icon}</span>`}
        </div>
        <div class="li-body">
          <div class="li-ttl">${item.url?`<a href="${item.url}" target="_blank" rel="noopener">${item.title}</a>`:item.title}</div>
          <div class="li-meta">
            <span style="color:${c?.color}">${c?.name||''}</span>
            <span style="background:${tm.bg};color:${tm.color};padding:1px 5px;border-radius:3px;font-size:10px;">${tm.label}</span>
            <span>${item.feedName}</span><span>${ago(item.time)}</span>
            ${stars?`<span style="color:#F59E0B">${stars}</span>`:''}
          </div>
        </div>
        <button class="li-del" onclick="delItem('${item.id}')">×</button>
      </div>`;
    }).join('');
  }
}
function selCat(id){S.selCat=id;closeSB();renderSB();renderTags();renderFeed();}
function setView(v){S.view=v;persist();document.getElementById('vg').className='vb'+(v==='grid'?' on':'');document.getElementById('vl').className='vb'+(v==='list'?' on':'');renderFeed();}
function delItem(id){S.items=S.items.filter(i=>i.id!==id);persist();renderSB();renderFeed();showToast('削除しました');}
function cycleStar(id){const item=S.items.find(i=>i.id===id);if(item){item.star=((item.star||0)+1)%4;persist();renderFeed();}}
function openAdd(){
  document.getElementById('m-cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  ['m-title','m-url','m-memo'].forEach(id=>document.getElementById(id).value='');
  const mo=document.getElementById('add-mo');mo.style.display='flex';
  setTimeout(()=>document.getElementById('m-title').focus(),80);
}
function closeAdd(){document.getElementById('add-mo').style.display='none';}
function saveItem(){
  const title=document.getElementById('m-title').value.trim();if(!title)return;
  const url=document.getElementById('m-url').value.trim();
  const catId=parseInt(document.getElementById('m-cat').value);
  const memo=document.getElementById('m-memo').value.trim();
  const vid=ytId(url);
  const thumb=vid?ytThumb(vid):'';
  S.items.unshift({id:'m_'+S.nii++,catId,type:'other',title,url,thumb,memo,time:Date.now(),star:0,feedName:'手動追加'});
  persist();closeAdd();renderSB();renderTags();renderFeed();showToast('追加しました');
}
function toggleSB(){document.getElementById('sb').classList.toggle('op');document.getElementById('sb-ov').classList.toggle('op');}
function closeSB(){document.getElementById('sb').classList.remove('op');document.getElementById('sb-ov').classList.remove('op');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2500);}
renderSB();renderTags();renderFeed();
</script>
</body>
</html>
